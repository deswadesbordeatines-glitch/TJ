name: Build Windows Offline Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "windows_offline_invoice_tool/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: windows_offline_invoice_tool

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: windows_offline_invoice_tool/requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build Windows exe with PyInstaller
        shell: pwsh
        run: |
          $appName = "发票识别工具"
          if (Test-Path build) { Remove-Item build -Recurse -Force }
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          pyinstaller `
            --noconfirm `
            --clean `
            --onedir `
            --windowed `
            --name $appName `
            main.py
          Copy-Item README.txt "dist\$appName\README.txt" -Force

      - name: Smoke test executable exists
        shell: pwsh
        run: |
          $exe = "dist\发票识别工具\发票识别工具.exe"
          if (!(Test-Path $exe)) {
            Write-Error "Expected exe not found: $exe"
            exit 1
          }
          Get-ChildItem "dist\发票识别工具" | Select-Object Name, Length

      - name: Create release zip
        shell: pwsh
        run: |
          $zipName = "发票识别工具-Windows离线版.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "dist\发票识别工具" -DestinationPath $zipName -Force
          Get-Item $zipName | Select-Object FullName, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: procurement-invoice-tool-windows-offline
          path: windows_offline_invoice_tool/发票识别工具-Windows离线版.zip
          if-no-files-found: error
